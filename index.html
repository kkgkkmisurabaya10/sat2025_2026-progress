<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Arsip Ujian SAT 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { 
            background-color: #f4f7f6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .card-class { 
            border: none; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            transition: all 0.3s ease;
        }
        .card-class:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
        }
        .file-badge {
            font-size: 0.75rem;
            padding: 0.35em 0.65em;
            text-decoration: none;
            border-radius: 6px;
            transition: opacity 0.2s;
        }
        .file-badge:hover { opacity: 0.8; }
        .bg-gradient-primary { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
            color: white; 
        }
        .uploader-name { font-size: 0.8rem; color: #6c757d; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row mb-4 align-items-center">
        <div class="col-md-8">
            <h2 class="fw-bold"><i class="bi bi-archive-fill text-primary me-2"></i>Live Dashboard Arsip SAT</h2>
            <p class="text-muted mb-0">Pemantauan real-time unggahan Kisi-kisi, Soal, dan Kunci Jawaban.</p>
        </div>
        <div class="col-md-4 text-md-end mt-3 mt-md-0">
            <div id="last-update" class="small text-muted mb-2"></div>
            <button onclick="fetchData()" class="btn btn-primary btn-sm px-3 rounded-pill shadow-sm">
                <i class="bi bi-arrow-clockwise me-1"></i> Refresh Data
            </button>
        </div>
    </div>

    <div class="row mb-4" id="summary-stats"></div>

    <div class="row g-4" id="dashboard-content">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">Menghubungkan ke database spreadsheet...</p>
        </div>
    </div>
</div>

<script>
    // URL Publikasi CSV (Ubah bagian ini dengan link Publish to Web CSV Anda)
    // Formatnya harus diakhiri dengan output=csv
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1w1Tq6kpCm4kg0ivoBpD0hQYlUyLwlvs4z_g4MNkhPzE/export?format=csv&gid=0"; 

    function fetchData() {
        document.getElementById('dashboard-content').innerHTML = `
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-muted">Mengambil data terbaru...</p>
            </div>
        `;

        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                renderDashboard(results.data);
                document.getElementById('last-update').innerHTML = `<i class="bi bi-clock-history"></i> Update: ${new Date().toLocaleString('id-ID')}`;
            },
            error: function(error) {
                console.error("Error parsing CSV:", error);
                document.getElementById('dashboard-content').innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger shadow-sm border-0"><i class="bi bi-exclamation-triangle-fill me-2"></i> Gagal memuat data. Pastikan Sheet sudah dipublish sebagai CSV.</div>
                    </div>`;
            }
        });
    }

    function renderDashboard(data) {
        const dashboard = document.getElementById('dashboard-content');
        const summary = document.getElementById('summary-stats');
        dashboard.innerHTML = "";
        
        // Memfilter baris yang kosong (misal tidak ada id_arsip)
        const validData = data.filter(row => row.id_arsip && row.id_arsip.trim() !== "");

        // Mengelompokkan data berdasarkan kolom "kelas"
        const groups = validData.reduce((acc, item) => {
            const key = item.kelas ? item.kelas.trim() : "Lainnya";
            if (!acc[key]) acc[key] = [];
            acc[key].push(item);
            return acc;
        }, {});

        // Menampilkan Ringkasan Global
        summary.innerHTML = `
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card card-class bg-gradient-primary p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="text-white-50 fw-semibold mb-1">Total Arsip Masuk</div>
                            <h2 class="fw-bold mb-0 text-white">${validData.length} <span class="fs-6 fw-normal">Mapel</span></h2>
                        </div>
                        <div class="bg-white bg-opacity-25 p-3 rounded-circle">
                            <i class="bi bi-cloud-check-fill fs-2 text-white"></i>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // Mengurutkan nama kelas (1, 2, 3, dst)
        const sortedClasses = Object.keys(groups).sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));

        // Render Kartu per Kelas
        sortedClasses.forEach(kelas => {
            const items = groups[kelas];
            const totalMapel = items.length;

            const card = document.createElement('div');
            card.className = "col-md-6 col-xl-4";
            
            // Render setiap mapel di dalam kelas tersebut
            let listHTML = items.map(i => {
                const mapel = i.mata_pelajaran || "-";
                const namaGuru = i.nama_pengirim || "-";
                
                // Cek status link
                const hasKisi = i.kisi_kisi_url && i.kisi_kisi_url.trim() !== "";
                const hasSoal = i.soal_url && i.soal_url.trim() !== "";
                const hasKunci = i.kunci_url && i.kunci_url.trim() !== "";

                // Membuat badge tombol
                const badgeKisi = hasKisi ? `<a href="${i.kisi_kisi_url}" target="_blank" class="file-badge bg-primary text-white"><i class="bi bi-grid-1x2"></i> Kisi</a>` : `<span class="file-badge bg-light text-muted border"><i class="bi bi-x"></i> Kisi</span>`;
                const badgeSoal = hasSoal ? `<a href="${i.soal_url}" target="_blank" class="file-badge bg-success text-white"><i class="bi bi-file-earmark-text"></i> Soal</a>` : `<span class="file-badge bg-light text-muted border"><i class="bi bi-x"></i> Soal</span>`;
                const badgeKunci = hasKunci ? `<a href="${i.kunci_url}" target="_blank" class="file-badge bg-warning text-dark"><i class="bi bi-key-fill"></i> Kunci</a>` : `<span class="file-badge bg-light text-muted border"><i class="bi bi-x"></i> Kunci</span>`;

                return `
                    <div class="list-group-item px-3 py-3 border-bottom">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <div class="fw-bold text-dark">${mapel}</div>
                                <div class="uploader-name"><i class="bi bi-person-circle me-1"></i> ${namaGuru}</div>
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-1">
                            ${badgeKisi} ${badgeSoal} ${badgeKunci}
                        </div>
                    </div>
                `;
            }).join('');

            card.innerHTML = `
                <div class="card card-class h-100 bg-white">
                    <div class="card-header bg-white border-0 pt-4 pb-2 px-4 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0 text-primary">Kelas ${kelas}</h5>
                        <span class="badge bg-primary bg-opacity-10 text-primary rounded-pill px-3 py-2">
                            ${totalMapel} Mapel
                        </span>
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush rounded-bottom">
                            ${listHTML}
                        </div>
                    </div>
                </div>
            `;
            dashboard.appendChild(card);
        });
    }

    // Jalankan pertama kali
    fetchData();
</script>
</body>
</html>
