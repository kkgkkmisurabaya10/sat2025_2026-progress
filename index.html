<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progres Bank Soal SAT 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #f4f7fe; 
            font-family: 'Nunito', sans-serif; 
            color: #2b3674;
        }
        
        /* Modern Header Gradient */
        .top-bg { 
            background: linear-gradient(135deg, #111827 0%, #374151 100%);
            color: white; 
            padding: 60px 0 80px 0; 
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            margin-bottom: -60px;
            box-shadow: 0 10px 30px rgba(17, 24, 39, 0.1);
        }

        .header-logo {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            margin-bottom: 15px;
            background-color: white;
            transition: transform 0.3s ease;
        }

        .header-logo:hover {
            transform: scale(1.05);
        }

        /* Glassmorphism Cards */
        .card-custom { 
            border-radius: 20px; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            border: 1px solid rgba(255,255,255,0.2); 
            margin-bottom: 25px; 
            overflow: hidden;
        }

        /* Modern Stat Cards */
        .stat-card { 
            text-align: left; 
            padding: 25px; 
            border-radius: 20px; 
            color: white; 
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            z-index: 1;
        }

        .stat-content {
            position: relative;
            z-index: 2;
        }

        .stat-icon-large {
            position: absolute;
            bottom: -10px;
            right: 15px;
            font-size: 5rem;
            opacity: 0.15;
            z-index: 1;
            transform: rotate(-15deg);
        }

        .bg-kisi { background: linear-gradient(135deg, #059669 0%, #34d399 100%); }
        .bg-soal { background: linear-gradient(135deg, #e11d48 0%, #fb7185 100%); }
        .bg-kunci { background: linear-gradient(135deg, #2563eb 0%, #60a5fa 100%); }
        
        .stat-number { font-weight: 800; font-size: 2.5rem; line-height: 1; margin-bottom: 5px; }
        .stat-label { font-size: 0.95rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; opacity: 0.9; }

        /* Icon Status in Table */
        .icon-status { font-size: 1.4rem; transition: transform 0.2s; }
        .icon-status:hover { transform: scale(1.2); }
        .status-ada { color: #10b981; filter: drop-shadow(0 2px 4px rgba(16, 185, 129, 0.3)); }
        .status-belum { color: #ef4444; opacity: 0.2; }

        /* Table Styling */
        .table { margin-bottom: 0; }
        .table th { 
            background-color: #f8fafc; 
            color: #64748b;
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            letter-spacing: 1px;
            border-bottom: 2px solid #e2e8f0;
            padding: 15px;
        }
        .table td {
            padding: 15px;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
        }
        .table tbody tr:hover { background-color: #f8fafc; }

        /* Accordion Modernization */
        .accordion-button {
            padding: 20px;
            font-weight: 700;
            color: #1e293b;
            background-color: #ffffff;
            border: none;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.3s ease;
        }
        .accordion-button:not(.collapsed) { 
            background-color: #f8fafc; 
            color: #2563eb; 
            box-shadow: inset 0 -2px 0 #2563eb;
        }
        .accordion-button:focus { box-shadow: none; border-color: rgba(0,0,0,.125); }
        .accordion-item { border: none; border-radius: 15px !important; overflow: hidden; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        
        .badge-kelas {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 8px 15px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px rgba(99, 102, 241, 0.2);
        }

        .btn-refresh {
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="top-bg">
    <div class="container text-center">
        <img src="https://lh3.googleusercontent.com/d/17PFUvnIUrEjXgMJkiAA0D1pejOgJkKfS" alt="Logo KKG" class="header-logo">
        <h2 class="fw-bold mb-2"><i class="fas fa-chart-line me-2"></i> Dashboard Progres SAT</h2>
        <p class="mb-0 text-light opacity-75 fw-semibold letter-spacing-1">Monitoring Pengumpulan Berkas Kelas 1-5 KKMI Surabaya 10</p>
    </div>
</div>

<div class="container position-relative" style="z-index: 10;">
    
    <div class="row mb-4">
        <div class="col-md-4 mb-3 mb-md-0">
            <div class="stat-card bg-kisi">
                <i class="fas fa-file-excel stat-icon-large"></i>
                <div class="stat-content">
                    <div class="stat-number" id="countKisi">0</div>
                    <div class="stat-label">Kisi-kisi Excel</div>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3 mb-md-0">
            <div class="stat-card bg-soal">
                <i class="fas fa-file-pdf stat-icon-large"></i>
                <div class="stat-content">
                    <div class="stat-number" id="countSoal">0</div>
                    <div class="stat-label">Naskah Soal</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card bg-kunci">
                <i class="fas fa-key stat-icon-large"></i>
                <div class="stat-content">
                    <div class="stat-number" id="countKunci">0</div>
                    <div class="stat-label">Kunci Jawaban</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card card-custom">
        <div class="card-header bg-white py-4 px-4 d-flex justify-content-between align-items-center border-bottom-0">
            <h5 class="mb-0 fw-bold" style="color: #1e293b;"><i class="fas fa-server text-indigo me-2" style="color: #6366f1;"></i> Rincian Progres per Kelas</h5>
            <button class="btn btn-outline-primary btn-refresh" onclick="loadData()">
                <i class="fas fa-sync-alt me-1"></i> Segarkan
            </button>
        </div>
        <div class="card-body p-4 pt-0">
            
            <div id="loadingIndicator" class="text-center py-5">
                <div class="spinner-border" style="color: #6366f1; width: 3rem; height: 3rem;" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <h5 class="mt-4 fw-bold text-muted">Sinkronisasi Data...</h5>
                <p class="text-muted small">Mengambil informasi terbaru dari server</p>
            </div>

            <div class="accordion" id="accordionKelas" style="display: none;">
                </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // ==========================================
    // MASUKKAN URL DEPLOYMENT APPS SCRIPT YANG SAMA DENGAN APLIKASI UPLOAD
    const API_URL = 'https://script.google.com/macros/s/AKfycbzJ4Sq2v8ajxBlAcUzGakBBmkfApOmj5eUC4tGwGpPdAZWTEEJekA3bkqMPHZWQYpQ41w/exec';
    // ==========================================

    window.onload = () => {
        loadData();
    };

    async function loadData() {
        document.getElementById('loadingIndicator').style.display = 'block';
        document.getElementById('accordionKelas').style.display = 'none';

        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'get_data', role: 'admin' }), 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
            });
            const req = await res.json();
            
            if (req.success) {
                processData(req.data);
            } else {
                alert("Gagal memuat data: " + req.message);
            }
        } catch (error) {
            alert("Kesalahan koneksi internet saat memuat progres.");
        }
    }

    function processData(rawData) {
        let totalKisi = 0;
        let totalSoal = 0;
        let totalKunci = 0;

        let mergedData = { "1": [], "2": [], "3": [], "4": [], "5": [] };
        let tempMap = {};

        let sortedData = rawData.reverse(); 

        sortedData.forEach(row => {
            let mapelKey = row.mata_pelajaran.trim().toUpperCase();
            let uniqueKey = row.kelas + "_" + mapelKey;

            if (!tempMap[uniqueKey]) {
                tempMap[uniqueKey] = {
                    kelas: row.kelas,
                    mapel: mapelKey,
                    pengirim: row.nama_pengirim,
                    kisi: row.kisi_url ? true : false,
                    soal: row.soal_url ? true : false,
                    kunci: row.kunci_url ? true : false,
                    waktu: row.waktu
                };
            } else {
                if (row.kisi_url) tempMap[uniqueKey].kisi = true;
                if (row.soal_url) tempMap[uniqueKey].soal = true;
                if (row.kunci_url) tempMap[uniqueKey].kunci = true;
                tempMap[uniqueKey].pengirim = row.nama_pengirim; 
                tempMap[uniqueKey].waktu = row.waktu;
            }
        });

        for (const key in tempMap) {
            let item = tempMap[key];
            if (mergedData[item.kelas]) {
                mergedData[item.kelas].push(item);
            }
            if(item.kisi) totalKisi++;
            if(item.soal) totalSoal++;
            if(item.kunci) totalKunci++;
        }

        // Animasi Counter Sederhana
        animateValue("countKisi", 0, totalKisi, 1000);
        animateValue("countSoal", 0, totalSoal, 1000);
        animateValue("countKunci", 0, totalKunci, 1000);

        renderAccordion(mergedData);
    }

    function renderAccordion(mergedData) {
        const accordionContainer = document.getElementById('accordionKelas');
        let html = '';

        for (let i = 1; i <= 5; i++) {
            let kelasData = mergedData[i.toString()];
            let jumlahMapel = kelasData ? kelasData.length : 0;
            
            let tbodyHtml = '';
            if (jumlahMapel === 0) {
                tbodyHtml = `<tr><td colspan="6" class="text-center text-muted py-5"><i class="fas fa-folder-open fs-1 mb-3 opacity-25 d-block"></i>Belum ada berkas terkumpul untuk Kelas ${i}</td></tr>`;
            } else {
                kelasData.sort((a, b) => a.mapel.localeCompare(b.mapel));

                kelasData.forEach((row, index) => {
                    let iconKisi = row.kisi ? '<i class="fas fa-check-circle icon-status status-ada"></i>' : '<i class="fas fa-times-circle icon-status status-belum"></i>';
                    let iconSoal = row.soal ? '<i class="fas fa-check-circle icon-status status-ada"></i>' : '<i class="fas fa-times-circle icon-status status-belum"></i>';
                    let iconKunci = row.kunci ? '<i class="fas fa-check-circle icon-status status-ada"></i>' : '<i class="fas fa-times-circle icon-status status-belum"></i>';

                    tbodyHtml += `
                        <tr>
                            <td class="text-muted fw-semibold text-center">${index + 1}</td>
                            <td class="fw-bold" style="color: #334155;">${row.mapel}</td>
                            <td><span class="badge bg-light text-dark border p-2"><i class="fas fa-user-edit me-1 text-muted"></i> ${row.pengirim}</span></td>
                            <td class="text-center">${iconKisi}</td>
                            <td class="text-center">${iconSoal}</td>
                            <td class="text-center">${iconKunci}</td>
                        </tr>
                    `;
                });
            }

            let isExpanded = i === 1 ? 'true' : 'false';
            let isCollapsedClass = i === 1 ? '' : 'collapsed';
            let isShowClass = i === 1 ? 'show' : '';

            html += `
                <div class="accordion-item border rounded-4 mb-3">
                    <h2 class="accordion-header" id="heading${i}">
                        <button class="accordion-button ${isCollapsedClass} rounded-4" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${i}" aria-expanded="${isExpanded}" aria-controls="collapse${i}">
                            <div class="d-flex align-items-center w-100 pe-3">
                                <div class="bg-light rounded-circle p-2 me-3 text-primary border" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                                    <i class="fas fa-chalkboard-teacher"></i>
                                </div>
                                <span class="fs-5">Kelas ${i}</span>
                                <span class="badge badge-kelas ms-auto rounded-pill">${jumlahMapel} Mapel Masuk</span>
                            </div>
                        </button>
                    </h2>
                    <div id="collapse${i}" class="accordion-collapse collapse ${isShowClass}" aria-labelledby="heading${i}" data-bs-parent="#accordionKelas">
                        <div class="accordion-body p-0 border-top">
                            <div class="table-responsive">
                                <table class="table table-borderless table-hover align-middle mb-0">
                                    <thead>
                                        <tr>
                                            <th width="5%" class="text-center">No</th>
                                            <th width="30%">Mata Pelajaran</th>
                                            <th width="35%">Update Terakhir Oleh</th>
                                            <th width="10%" class="text-center">Kisi-kisi</th>
                                            <th width="10%" class="text-center">Soal</th>
                                            <th width="10%" class="text-center">Kunci</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${tbodyHtml}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        accordionContainer.innerHTML = html;
        document.getElementById('loadingIndicator').style.display = 'none';
        accordionContainer.style.display = 'block';
    }

    // Animasi angka counter
    function animateValue(id, start, end, duration) {
        if (start === end) {
            document.getElementById(id).innerHTML = end;
            return;
        }
        let range = end - start;
        let current = start;
        let increment = end > start ? 1 : -1;
        let stepTime = Math.abs(Math.floor(duration / range));
        let obj = document.getElementById(id);
        let timer = setInterval(function() {
            current += increment;
            obj.innerHTML = current;
            if (current == end) {
                clearInterval(timer);
            }
        }, stepTime);
    }
</script>
</body>
</html>
